version: "3.9"

networks:
  pip-network:
    driver: bridge

volumes:
  redis-data:

services:

  # ─── REDIS ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pip-redis
    command: redis-server --appendonly yes --requirepass "RedisP@ss!"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pip-network
    healthcheck:
      test: redis-cli -a "RedisP@ss!" ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SCRAPER SERVICE ────────────────────────────────────────────────────────
  scraper:
    build:
      context: ./services/scraper-service
      dockerfile: Dockerfile
    container_name: pip-scraper
    environment:
      REDIS_URL: "redis://:RedisP@ss!@redis:6379"
      API_BASE_URL: "http://host.docker.internal:5000"
      API_INTERNAL_KEY: "internal-secret-key-2024"
      LOG_LEVEL: "INFO"
      SCRAPE_INTERVAL_SECONDS: "3600"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pip-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── AI MATCHING SERVICE ────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: pip-ai
    environment:
      REDIS_URL: "redis://:RedisP@ss!@redis:6379"
      API_BASE_URL: "http://host.docker.internal:5000"
      API_INTERNAL_KEY: "internal-secret-key-2024"
      MODEL_NAME: "all-MiniLM-L6-v2"
      SIMILARITY_THRESHOLD: "0.80"
      LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pip-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"